---

# project information
project_name: steam
project_url: "https://store.steampowered.com/"
project_logo: "https://raw.githubusercontent.com/linuxserver/docker-templates/master/linuxserver.io/img/steam-logo.png"
project_blurb: "[Steam]({{ project_url }}) is the ultimate destination for playing, discussing, and creating games."
project_lsio_github_repo_url: "https://github.com/linuxserver/docker-{{ project_name }}"
project_blurb_optional_extras_enabled: false
project_categories: "Games"
# supported architectures
available_architectures:
  - {arch: "{{ arch_x86_64 }}", tag: "latest"}
# development version
development_versions: false
# container parameters
common_param_env_vars_enabled: true
param_container_name: "{{ project_name }}"
param_usage_include_vols: true
param_volumes:
  - {vol_path: "/config", vol_host_path: "/path/to/config", desc: "Users home directory in the container, stores all files and games."}
param_usage_include_ports: true
param_ports:
  - {external_port: "3000", internal_port: "3000", port_desc: "Steam desktop gui HTTP must be proxied."}
  - {external_port: "3001", internal_port: "3001", port_desc: "Steam desktop gui HTTPS."}
security_opt_param: true
security_opt_param_vars:
  - {run_var: "seccomp=unconfined", compose_var: "seccomp:unconfined", desc: "This is needed to allow bwrap to use namespacing for games."}
opt_security_opt_param: true
opt_security_opt_param_vars:
  - {run_var: "apparmor=unconfined", compose_var: "apparmor:unconfined", desc: "For Debian/Ubuntu hosts Steam needs elevated perms that AppArmor blocks."}
custom_params:
  - {name: "shm-size", name_compose: "shm_size", value: "1gb", desc: "Recommended for all desktop images."}
# Selkies blurb settings
selkies_blurb: true
# application setup block
app_setup_block_enabled: true
app_setup_block: |
  The application can be accessed at:

  * https://yourhost:3001/

  >[!NOTE]
  >This image is for a web accessible version of Steam to be played through a web browser it is in development and has oddities, if you want a fully flushed out Moonlight couch solution please consider [Wolf](https://games-on-whales.github.io/wolf/stable/user/quickstart.html) or another non Docker solution.

  >[!NOTE]
  >NVIDIA is not working correctly for many games, for now this image is only for Intel/AMD graphics cards. 

  ## Gamepad support

  This container leverages a userspace gamepad interposer to provide gamepad support. This will not work with all games. Proton runtimes are the most compatible but not a sure thing as some games require raw uinput calls. You cannot use the "Steam Input" feature on any game as the uinput socket and HID do not exist.

  ## Gaming mode

  An absolute must for mouse and keyboard input is sending relative mouse input from the browser, you will need to use the "Gaming Mode" which is a small crosshair in the top right of the sidebar. This runs in fullscreen and traps you in the window, to exit this mode hold down escape for 3 seconds.

# changelog
changelogs:
  - {date: "09.01.26:", desc: "Initial Version."}
