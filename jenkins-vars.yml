---

# jenkins variables
project_name: docker-steam
external_type: os
release_type: stable
release_tag: latest
ls_branch: master
build_armhf: false
repo_vars:
  - BUILD_VERSION_ARG = 'STEAM_VERSION'
  - LS_USER = 'linuxserver'
  - LS_REPO = 'docker-steam'
  - CONTAINER_NAME = 'steam'
  - DOCKERHUB_IMAGE = 'linuxserver/steam'
  - DEV_DOCKERHUB_IMAGE = 'lsiodev/steam'
  - PR_DOCKERHUB_IMAGE = 'lspipepr/steam'
  - DIST_IMAGE = 'debian'
  - MULTIARCH = 'false'
  - CI = 'true'
  - CI_WEB = 'true'
  - CI_PORT = '3001'
  - CI_SSL = 'true'
  - CI_DELAY = '120'
  - CI_DOCKERENV = 'TZ=US/Pacific'
  - CI_AUTH = 'user:password'
  - CI_WEBPATH = ''
